  --font-mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --rad:8px; --radl:12px; --border-radius-md:8px; --border-radius-lg:12px;
}
@media (prefers-color-scheme:dark){

    --color-text-primary:#ececec; --color-text-secondary:#a8a8a2; --color-text-tertiary:#7d7d77;

    --color-background-warning:#633806; --color-text-warning:#FAC775;
  }
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--color-background-tertiary);color:var(--color-text-primary);font-family:var(--font-sans);}
button,select{font-family:inherit;}
button:active{transform:scale(0.98);}
.rel:hover{border-color:var(--color-border-secondary)!important;}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}
#wrap{max-width:920px;margin:0 auto;padding:18px 16px 40px;}
#card-surface{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--radl);padding:16px 18px;}
table.dt{width:100%;border-collapse:collapse;font-size:12px;}
table.dt th{text-align:left;color:var(--color-text-tertiary);font-weight:500;padding:6px 8px;border-bottom:0.5px solid var(--color-border-tertiary);white-space:nowrap;}
table.dt td{padding:7px 8px;border-bottom:0.5px solid var(--color-border-tertiary);}
table.dt tr.rel{cursor:pointer;}
table.dt tr.rel:hover td{background:var(--color-background-secondary);}
.ctab{font-size:13px;padding:9px 0;margin-right:18px;border:none;background:none;color:var(--color-text-secondary);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
.ctab.on{color:var(--color-text-primary);border-bottom-color:var(--color-text-primary);font-weight:500;}
.poster{position:relative;overflow:hidden;width:54px;height:78px;border-radius:var(--rad);background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;color:var(--color-text-tertiary);flex:none;}
.tag{font-size:11px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--rad);padding:2px 8px;color:var(--color-text-secondary);}
.sub{border:0.5px solid var(--color-border-tertiary);border-radius:var(--rad);padding:9px 11px;margin-bottom:8px;}
.sub .st{font-size:11px;color:var(--color-text-tertiary);margin-bottom:4px;}
.mcs{border:0.5px solid var(--color-border-tertiary);border-radius:var(--rad);padding:8px 9px;}
.mcs .l{font-size:10px;color:var(--color-text-tertiary);}
.mcs .v{font-size:16px;font-weight:500;margin-top:1px;}
.bcell{background:var(--color-background-secondary);border-radius:var(--rad);padding:8px;}
.bcell .l{font-size:11px;color:var(--color-text-secondary);}
.bcell .v{font-size:15px;font-weight:500;margin-top:2px;}
.csec{margin-top:14px;}
.csec h4{font-size:11px;font-weight:500;color:var(--color-text-tertiary);margin:0 0 7px;}
table.t{width:100%;border-collapse:collapse;font-size:12px;}
table.t td{padding:5px 0;border-bottom:0.5px solid var(--color-border-tertiary);}
.hd{text-align:right;color:var(--color-text-tertiary);font-size:11px;}
.legend{font-size:11px;color:var(--color-text-tertiary);margin-top:6px;}
.dt td.stick,.dt th.stick{position:sticky;left:0;z-index:1;background:var(--color-background-primary);}
.dt tr:hover td.stick{background:var(--color-background-secondary);}
.msmark:hover{text-decoration:underline;}
</style>

    var h='<button id="backbtn" style="font-size:12px;padding:5px 11px;border-radius:'+RAD+';border:'+BD2+';background:transparent;color:'+TS+';cursor:pointer;margin-bottom:12px;"><i class="ti ti-arrow-left" aria-hidden="true"></i> '+esc(TABMETA[S.from]?TABMETA[S.from][0]:'Назад')+' / График релизов</button>';
    h+='<div style="border:'+BD+';border-radius:'+RADL+';background:'+BG+';padding:15px 17px;">'+cardHead(r);
    h+='<div style="border-bottom:'+BD+';margin:14px 0 0;display:flex;overflow-x:auto;">';tabs.forEach(function(t){h+='<button class="ctab '+(S.cardTab===t[0]?'on':'')+'" data-ctab="'+t[0]+'">'+t[1]+'</button>';});h+='</div>';
    h+='<div style="padding-top:16px;">'+cardPanel(r,S.cardTab)+'</div></div>';
    return h;
  }
  function opReadiness(r){var rows=[['Прокатное удостоверение',r.pu==='Получен'?['Получен','success']:[r.pu||'—','warning']],['Субтитры',r.subReady==='переведено'?['Готовы','success']:[r.subReady||'—','warning']],['DCP',r.ready&&r.ready.dcp?['Получен','success']:['Ожидается','warning']],['Форматы',[esc(r.fmt),null]],['Хрон · Рейтинг',[(r.runtime?r.runtime+' мин':'—')+' · '+r.rating,null]]];var h='<table class="t">';rows.forEach(function(rw){h+='<tr><td style="color:'+TS+';">'+rw[0]+'</td><td style="text-align:right;">'+(rw[1][1]?pill(rw[1][0],rw[1][1]):'<span>'+rw[1][0]+'</span>')+'</td></tr>';});h+='</table>';return h;}

  function cardPanel(r,tab){
    var f=enrich(r);var bopct=f.estNum?Math.round(f.factNum/f.estNum*100):0;
    if(tab==='hist')return '<div style="font-size:12px;color:'+TS+';margin-bottom:6px;">История изменений (change_history + живой лог):</div>'+['Оператор графика · добавил релиз из'+r.source+' · 02.03','Дистрибуция · эстимейт утверждён ·'+(r.estDate||'—'),'Локализация · субтитры →'+r.subReady+' · 05.04','Букинг · роспись'+r.copies+'/'+r.total+' КТ · 25.04','Аналитика · сборы обновлены ⚙ · сегодня'].map(function(l){return '<div style="font-size:12px;padding:6px 0;border-bottom:'+BD+';display:flex;gap:8px;"><i class="ti ti-point" style="color:'+TT+';" aria-hidden="true"></i>'+esc(l)+'</div>';}).join('');
    if(!r.own){
      if(tab==='box')return '<div class="csec"><h4>Сборы · данные на '+f.asOf+'</h4>'+(f.released?'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;">'+mc('Бокс-офис','₸ '+esc(r.box),'рынок · '+esc(r.source))+mc('Зрители',esc(r.adm),'')+mc('Доля рынка',esc(r.share),'')+'</div>':'<div style="font-size:12px;color:'+TS+';">Релиз ещё не в прокате.</div>')+'</div>';
      return '<table class="t"><tr><td style="color:'+TS+';">Жанр</td><td style="text-align:right;">'+esc(r.genre||'—')+'</td></tr><tr><td style="color:'+TS+';">Дистрибьютор</td><td style="text-align:right;">'+esc(r.dist)+'</td></tr><tr><td style="color:'+TS+';">Территория</td><td style="text-align:right;">'+esc(r.terr)+'</td></tr><tr><td style="color:'+TS+';">Статус</td><td style="text-align:right;">'+pill(r.status,statusVar(r.status))+'</td></tr></table>';
    }
    if(tab==='box'){
      if(S.role==='igor')return estimateHistory(f)+'<div class="csec"><h4>Эстимейт vs факт — по дням (KZ и СНГ)</h4>'+dailyChart(f)+(f.released?'<div class="legend"><span style="color:'+TX+';">— факт KZ</span> · <span style="color:#378ADD;">— факт СНГ</span> · ---- estimate</div>':'')+'</div><div class="csec"><h4>Сборы · данные на '+f.asOf+'</h4>'+boxBlock(f)+'</div>'+ownerInsights(f);
      if(S.role==='rustam')return estimateHistory(f)+'<div class="csec"><h4>Сборы · данные на '+f.asOf+'</h4>'+boxBlock(f)+'</div>'+(f.released?'<div class="csec"><h4>План / факт по неделям</h4>'+chartWeekly(f.estNum,f.factNum)+'</div>':'')+'<div class="csec"><h4>Сопоставимые (Comp Engine)</h4>'+compTable(f)+'<div class="legend">Сезонность «Когда выходить»: нед. '+(r.week||'').replace('нед. ','')+' — средняя сила сезона.</div></div>';
      return estimateHistory(f)+'<div class="csec"><h4>Сборы · данные на '+f.asOf+'</h4>'+boxBlock(f)+'</div>';
    }
    if(tab==='ops'){
      if(S.role==='nizami')return '<div class="csec"><h4>Локализация</h4><table class="t"><tr><td style="color:'+TS+';">Дубляж</td><td style="text-align:right;">'+esc(r.dub)+'</td></tr><tr><td style="color:'+TS+';">Субтитры</td><td style="text-align:right;">'+esc(r.sub)+'</td></tr><tr><td style="color:'+TS+';">Готовность суб.</td><td style="text-align:right;">'+pill(r.subReady,r.subReady==='переведено'?'success':'warning')+'</td></tr><tr><td style="color:'+TS+';">Подрядчик</td><td style="text-align:right;">'+esc(r.contractor)+'</td></tr><tr><td style="color:'+TS+';">Диал. листы</td><td style="text-align:right;">'+esc(r.dialog)+'</td></tr><tr><td style="color:'+TS+';">Файлы</td><td style="text-align:right;">'+esc(r.files)+'</td></tr><tr><td style="color:'+TS+';">Хронометраж</td><td style="text-align:right;">'+r.runtime+' мин</td></tr></table></div>';
      var h='<div class="csec">'+grid(2,mc('Прогресс росписи',r.copies+'/'+r.total,'согласовано',r.copies/r.total*100,Math.round(r.copies/r.total*100)+'%','info')+mc('ПУ',esc(r.pu),'гейт выгрузки',null,r.pu==='Получен'?'выгрузка разблокирована':'ожидается','success'))+'</div><div class="csec"><h4>Операционная готовность</h4>'+opReadiness(r)+'</div><div class="csec"><h4>Параметры росписи</h4><table class="t"><tr><td style="color:'+TS+';">Окно проката</td><td style="text-align:right;">'+f.window+'</td></tr><tr><td style="color:'+TS+';">Минималка / %</td><td style="text-align:right;">'+f.minGuarantee+' · '+f.rightShare+'</td></tr><tr><td style="color:'+TS+';">Территории</td><td style="text-align:right;">'+esc(r.terr)+'</td></tr></table></div>';if(r.age==='21+')h+='<div style="font-size:11px;color:var(--color-text-danger);background:var(--color-background-danger);padding:6px 9px;border-radius:'+RAD+';margin-top:10px;"><i class="ti ti-alert-triangle" aria-hidden="true"></i> 21+ — показ после 22:00, учтите ночные слоты.</div>';return h;
    }
    if(tab==='offline'){var sum=OFFLINE.reduce(function(a,o){return a+(parseFloat(o[3].replace(/[^0-9.]/g,''))||0);},0);var rows=OFFLINE.map(function(o){var st=/размещ|оплач/.test(o[4])?'success':(/работе/.test(o[4])?'warning':'info');return '<tr><td>'+o[0]+'</td><td style="text-align:right;color:'+TS+';">'+o[1]+'</td><td style="text-align:right;color:'+TS+';">'+o[2]+'</td><td style="text-align:right;font-weight:500;">'+o[3]+'</td><td style="text-align:right;">'+pill(o[4],st)+'</td></tr>';}).join('');return '<div class="csec"><h4>Заказы офлайн-рекламы</h4><table class="t"><tr><td>Подрядчик / площадка</td><td class="hd">Тип</td><td class="hd">Детали</td><td class="hd">Цена</td><td class="hd">Статус</td></tr>'+rows+'<tr style="font-weight:500;"><td>Итого</td><td></td><td></td><td style="text-align:right;">₸ '+sum.toFixed(1)+' млн</td><td></td></tr></table></div><div class="csec" style="display:flex;gap:8px;"><button class="bridge" data-bridge="Выгрузка трат в бухучёт" style="font-size:12px;padding:6px 12px;border-radius:'+RAD+';border:none;background:'+TX+';color:'+BG+';cursor:pointer;"><i class="ti ti-download" aria-hidden="true"></i> Выгрузить для бухгалтерии</button><button class="bridge" data-bridge="Добавить заказ" style="font-size:12px;padding:6px 12px;border-radius:'+RAD+';border:'+BD2+';background:transparent;color:'+TX+';cursor:pointer;"><i class="ti ti-plus" aria-hidden="true"></i> Добавить заказ</button></div>';}
    /* tab === 'ov' */
    if(S.role==='kolodkin')return '<div class="csec">'+grid(2,bc('Эстимейт (утв.)','₸ '+esc(r.estimate))+bc('Приоритет',r.cat==='AAA'?'High':(r.cat==='C'?'Low':'Mid')))+'</div><div class="csec"><h4>Команда и потенциал</h4><table class="t"><tr><td style="color:'+TS+';">Режиссёр</td><td style="text-align:right;">'+esc(r.director)+' · '+esc(r.knownFor)+'</td></tr><tr><td style="color:'+TS+';">Прошлые сборы реж.</td><td style="text-align:right;">'+esc(r.prevBO)+'</td></tr></table></div><div class="csec"><h4>Сопоставимые (Comp Engine)</h4>'+compTable(f)+'</div><div class="csec"><h4>Ситуация недели</h4><div style="font-size:12px;color:'+TS+';">'+r.week+': '+pill('risk: '+(r.cat==='AAA'||r.cat==='AA'?'mid':'low'),(r.cat==='AAA'||r.cat==='AA'?'warning':'success'))+'</div></div>';
    if(S.role==='igor'){var dn='<div class="csec">'+aiBar()+'</div>';var t=grid(3,mcs('Бокс-офис KZ',f.released?'₸ '+f.factNum+'М':'—',f.released?bopct+'% от est':'до старта','warning')+mcs('Бокс-офис СНГ',f.released?'₸ '+num(f.boxLocalTotal[3])+'М':'—','5 территорий')+mcs('Зрители СНГ',f.released?f.boxLocalTotal[2]:'—','')+mcs('Доля рынка KZ',esc(r.share),'неделя релиза')+mcs('ДРР',f.drr?f.drr+'%':'—','норма < 8%','success')+mcs('Маркет-бюджет','₸ '+r.mSpent+'/'+r.mApproved+'М',''));return dn+'<div class="csec">'+t+'</div><div class="csec"><h4>Динамика по дням — KZ / СНГ vs estimate</h4>'+dailyChart(f)+'</div><div class="csec">'+grid(2,'<div><h4 style="font-size:11px;color:'+TT+';margin:0 0 7px;">По территориям</h4>'+terrMini(f)+'</div><div><h4 style="font-size:11px;color:'+TT+';margin:0 0 7px;">Мир — Box Office Mojo</h4>'+worldMini(f)+'</div>')+'</div><div class="csec"><div style="font-size:12px;color:'+TS+';">Статус: '+pill(r.status,statusVar(r.status))+(f.released?' · полный разбор — во вкладке «Эстимейт & Сборы»':'')+'</div></div>';}
    if(S.role==='dinara'){var bud=r.mApproved?Math.round(r.mSpent/r.mApproved*100):0,rp=r.reachGoal?Math.round(r.reachFact/r.reachGoal*100):0;return '<div class="csec">'+grid(2,mc('Маркет-бюджет','₸ '+r.mSpent+' млн','Потрачено / утв. ₸ '+r.mApproved+' млн',bud,'остаток ₸ '+(r.mApproved-r.mSpent)+' млн','success')+mc('Охват кампании',r.reachFact+'M','Факт / цель '+r.reachGoal+'M',rp,rp+'% от цели','warning')+mc('ДРР',r.drr?r.drr+'%':'—','',null,r.drr?'в норме':'',r.drr&&r.drr<8?'success':'warning')+mc('Бюджет от estimate','₸ '+Math.round(f.estNum*0.05)+'–'+Math.round(f.estNum*0.1)+' млн','7–10% от ₸ '+f.estNum+' млн'))+'</div><div class="csec"><h4>Даты кампании</h4><table class="t"><tr><td style="color:'+TS+';">Трейлер</td><td style="text-align:right;">'+esc(r.trailerDate)+'</td></tr><tr><td style="color:'+TS+';">Предпродажа</td><td style="text-align:right;">'+esc(r.presaleDate)+'</td></tr><tr><td style="color:'+TS+';">Премьера</td><td style="text-align:right;">'+esc(r.premiereDate)+'</td></tr></table></div><div class="csec"><h4>Соцсети — блогеры и контент</h4><table class="t"><tr><td>Аккаунт</td><td class="hd">Площадка</td><td class="hd">Формат</td><td class="hd">Тип</td><td class="hd">Охват</td></tr>'+SOCIAL.map(function(s){return '<tr><td>'+s[0]+'</td><td style="text-align:right;">'+platIcon(s[1])+s[1]+'</td><td style="text-align:right;">'+s[2]+'</td><td style="text-align:right;color:'+TS+';">'+s[3]+'</td><td style="text-align:right;font-weight:500;">'+s[4]+'</td></tr>';}).join('')+'</table></div>';}
    if(S.role==='alima')return '<div class="csec"><h4>Пресс-синопсис</h4><div style="font-size:13px;">«'+esc(r.title)+'» — '+esc(r.genre)+'. Премьера '+esc(r.premiereDate)+'.</div></div><div class="csec"><h4>Медиа-ассеты (MAM)</h4><div style="display:flex;gap:7px;flex-wrap:wrap;"><span class="tag"><i class="ti ti-photo" aria-hidden="true"></i> постер</span><span class="tag"><i class="ti ti-camera" aria-hidden="true"></i> кадры</span><span class="tag"><i class="ti ti-movie" aria-hidden="true"></i> трейлер</span><span class="tag"><i class="ti ti-file-text" aria-hidden="true"></i> пресс-кит</span></div></div><div class="csec"><h4>Рассылки</h4><div style="display:flex;gap:8px;flex-wrap:wrap;">'+pill('СМИ — 24','success')+pill('Блогеры — 48','success')+pill('Кинотеатры — в очереди','warning')+'</div></div>';
    /* kostya */
    return '<div class="csec"><h4>Провенанс</h4><table class="t"><tr><td style="color:'+TS+';">Источник</td><td style="text-align:right;"><i class="ti '+(srcIcon[r.source]||'ti-file')+'" aria-hidden="true"></i> '+esc(r.source)+'</td></tr><tr><td style="color:'+TS+';">Версия (As Of)</td><td style="text-align:right;">'+f.asOf+'</td></tr><tr><td style="color:'+TS+';">Подтверждена</td><td style="text-align:right;">'+pill('да','success')+'</td></tr></table></div><div class="csec"><h4>Базовые поля</h4><table class="t"><tr><td style="color:'+TS+';">Дата релиза</td><td style="text-align:right;">'+esc(r.date)+'</td></tr><tr><td style="color:'+TS+';">Территории</td><td style="text-align:right;">'+esc(r.terr)+'</td></tr><tr><td style="color:'+TS+';">Форматы</td><td style="text-align:right;">'+esc(r.fmt)+'</td></tr><tr><td style="color:'+TS+';">Категория</td><td style="text-align:right;">'+r.cat+'</td></tr></table></div>';
  }

  function render(){
    var ro=ROLES[S.role];var ownLocked=(ro.own==='own'&&['nurila'].indexOf(S.role)>=0);
    var cross={kolodkin:'Перейти к Планированию релизов',dinara:'Перейти в Маркетинг и PR',nurila:'Перейти к Росписи'}[S.role];
    var html='<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding-bottom:10px;border-bottom:'+BD+';margin-bottom:10px;"><span style="font-size:14px;font-weight:500;display:flex;align-items:center;gap:6px;"><i class="ti ti-calendar-event" aria-hidden="true"></i> График релизов</span><select id="roleSel" style="height:30px;font-size:12px;border-radius:'+RAD+';border:'+BD+';background:'+BG+';color:'+TX+';padding:0 8px;">'+Object.keys(ROLES).map(function(k){return '<option value="'+k+'"'+(k===S.role?' selected':'')+'>'+ROLES[k].role+'</option>';}).join('')+'</select>';
    if(cross)html+='<button class="bridge" data-bridge="'+esc(cross)+'" style="font-size:12px;padding:6px 11px;border-radius:'+RAD+';border:none;background:'+TX+';color:'+BG+';cursor:pointer;white-space:nowrap;"><i class="ti ti-external-link" aria-hidden="true"></i> '+esc(cross)+'</button>';
    if(!ownLocked)html+='<div style="margin-left:auto;display:flex;border:'+BD+';border-radius:'+RAD+';overflow:hidden;">'+ownBtn('own','Свои')+ownBtn('foreign','Чужие')+ownBtn('all','Все')+'</div>';else html+='<span style="margin-left:auto;"></span>';
    html+='<button id="aibtn" aria-label="ИИ-агент" style="height:30px;width:30px;border-radius:'+RAD+';border:'+BD+';background:transparent;cursor:pointer;color:'+TS+';"><i class="ti ti-sparkles" aria-hidden="true"></i></button><button id="bell" aria-label="Уведомления" style="height:30px;width:30px;border-radius:'+RAD+';border:'+BD+';background:transparent;cursor:pointer;color:'+TS+';"><i class="ti ti-bell" aria-hidden="true"></i></button></div>';
    if(!S.card){html+='<div style="display:flex;gap:4px;overflow-x:auto;margin-bottom:12px;">';ro.tabs.forEach(function(t){var on=S.tab===t;var m=TABMETA[t];html+='<button data-tab="'+t+'" style="font-size:12px;padding:6px 11px;border-radius:'+RAD+';border:'+(on?'1.5px solid var(--color-border-info)':BD)+';background:'+(on?'var(--color-background-info)':'transparent')+';color:'+(on?'var(--color-text-info)':TS)+';cursor:pointer;white-space:nowrap;flex:none;"><i class="ti '+m[1]+'" aria-hidden="true"></i> '+m[0]+'</button>';});html+='</div>';}
    html+='<div id="content">'+(S.card?cardView(R.filter(function(r){return r.id===S.card;})[0]):(VIEWS[S.tab]||function(){return '';})())+'</div>';
    app.innerHTML=html;wire();
  }
  function ownBtn(v,label){var on=S.own===v;return '<button data-own="'+v+'" style="font-size:12px;padding:6px 12px;border:none;background:'+(on?'var(--color-background-info)':'transparent')+';color:'+(on?'var(--color-text-info)':TS)+';cursor:pointer;">'+label+'</button>';}
  function wire(){
    var rs=document.getElementById('roleSel');if(rs)rs.onchange=function(){applyRole(this.value);render();};
    Array.prototype.forEach.call(app.querySelectorAll('[data-own]'),function(b){b.onclick=function(){S.own=this.getAttribute('data-own');S.card=null;render();};});
    Array.prototype.forEach.call(app.querySelectorAll('[data-tab]'),function(b){b.onclick=function(){S.tab=this.getAttribute('data-tab');S.card=null;S.ms=null;S.colOpen=false;render();};});
    Array.prototype.forEach.call(app.querySelectorAll('[data-mode]'),function(b){b.onclick=function(){S.mode=this.getAttribute('data-mode');render();};});
    Array.prototype.forEach.call(app.querySelectorAll('[data-ctab]'),function(b){b.onclick=function(){S.cardTab=this.getAttribute('data-ctab');render();};});
    Array.prototype.forEach.call(app.querySelectorAll('.msmark'),function(b){b.onclick=function(){S.ms=this.getAttribute('data-ms');render();};});
    var msc=document.querySelector('.msclose');if(msc)msc.onclick=function(){S.ms=null;render();};
    Array.prototype.forEach.call(app.querySelectorAll('[data-cal]'),function(b){b.onclick=function(){var dir=this.getAttribute('data-cal');S.calM+=(dir==='next'?1:-1);if(S.calM>11){S.calM=0;S.calY++;}if(S.calM<0){S.calM=11;S.calY--;}S.ms=null;render();};});
    Array.prototype.forEach.call(app.querySelectorAll('[data-calmode]'),function(b){b.onclick=function(){S.calMode=this.getAttribute('data-calmode');S.ms=null;render();};});
    var cb=document.getElementById('colbtn');if(cb)cb.onclick=function(){S.colOpen=!S.colOpen;render();};
    Array.prototype.forEach.call(app.querySelectorAll('.colchk'),function(b){b.onclick=function(e){e.stopPropagation();var k=this.getAttribute('data-col');var i=S.cols.indexOf(k);if(i>=0)S.cols.splice(i,1);else S.cols.push(k);render();};});
    var cs=document.querySelector('.colsave');if(cs)cs.onclick=function(){S.colOpen=false;toast('Вид сохранён');render();};
    var cr=document.querySelector('.colreset');if(cr)cr.onclick=function(){S.cols=DEFAULTCOLS.slice();render();};
    Array.prototype.forEach.call(app.querySelectorAll('.rel'),function(b){b.onclick=function(){S.from=S.tab;S.card=this.getAttribute('data-rel');S.cardTab=null;render();};});
    var back=document.getElementById('backbtn');if(back)back.onclick=function(){S.card=null;S.tab=S.from;render();};
    Array.prototype.forEach.call(app.querySelectorAll('.bridge'),function(b){b.onclick=function(e){e.stopPropagation();toast('→ '+this.getAttribute('data-bridge'));};});
    Array.prototype.forEach.call(app.querySelectorAll('[data-approve]'),function(b){b.onclick=function(){var id=this.getAttribute('data-approve');INBOX=INBOX.filter(function(x){return x.id!==id;});toast('Сматчено в Release · провенанс сохранён');render();};});
    Array.prototype.forEach.call(app.querySelectorAll('[data-reject]'),function(b){b.onclick=function(){var id=this.getAttribute('data-reject');INBOX=INBOX.filter(function(x){return x.id!==id;});render();};});
    var ai=document.getElementById('aibtn');if(ai)ai.onclick=function(){toast('ИИ-агент: «AAA Disney в Q4 без ПУ за 21 день»');};
    var bell=document.getElementById('bell');if(bell)bell.onclick=function(){toast('Telegram: аппрув · перенос даты · запрос КТ');};
  }
  render();
})();
</script>
</body>
