:root{

.mcs{border:0.5px solid var(--color-border-tertiary);border-radius:var(--rad);padding:8px 9px;}
.mcs .l{font-size:10px;color:var(--color-text-tertiary);}

.bcell{background:var(--color-background-secondary);border-radius:var(--rad);padding:8px;}
.bcell .l{font-size:11px;color:var(--color-text-secondary);}
.bcell .v{font-size:15px;font-weight:500;margin-top:2px;}
.btn{font-size:12px;padding:6px 12px;border-radius:var(--rad);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);cursor:pointer;}
.btn.pri{background:var(--color-text-primary);color:var(--color-background-primary);border:none;}
.legend{font-size:11px;color:var(--color-text-tertiary);margin-top:6px;}
.sub{border:0.5px solid var(--color-border-tertiary);border-radius:var(--rad);padding:9px 11px;margin-bottom:8px;}
.sub .st{font-size:11px;color:var(--color-text-tertiary);margin-bottom:4px;}
table.t{width:100%;border-collapse:collapse;font-size:12px;}
table.t td{padding:5px 0;border-bottom:0.5px solid var(--color-border-tertiary);}
.hd{text-align:right;color:var(--color-text-tertiary);font-size:11px;}
.poster{position:relative;overflow:hidden;width:46px;height:66px;border-radius:var(--rad);background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;color:var(--color-text-tertiary);flex:none;}
</style>

  function head(editBtn,openIn){return '<div class="fh"><div style="display:flex;gap:12px;"><div class="poster"><i class="ti ti-photo" aria-hidden="true"></i><img src="https://image.tmdb.org/t/p/w342/8unCRm0LeiO0fM6skWAZy3ZfXR1.jpg" alt="постер" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;" onerror="this.remove()"></div><div><div class="t">'+F.title+'</div><div class="m">'+F.genre+' · '+F.dist+' · '+F.resp+'</div></div></div><div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;">'+(openIn?'<button class="navbtn btn" data-nav="'+openIn+'"><i class="ti ti-external-link" aria-hidden="true"></i> '+openIn+'</button>':'')+(editBtn?'<button class="btn pri">Редактировать</button>':'<button class="btn">Обновить данные</button>')+'</div></div><div class="tags">'+pill('Категория '+F.cat,'warning')+pill('KZ · Казахстан','info')+'<span class="tag">40 дней после релиза</span><span class="tag">Релиз: '+F.date+'</span></div>';}
  function aiBar(){return '<div style="display:flex;gap:8px;align-items:center;border:0.5px solid var(--color-border-info);background:var(--color-background-info);border-radius:var(--rad);padding:8px 10px;flex-wrap:wrap;"><i class="ti ti-sparkles" style="color:var(--color-text-info);" aria-hidden="true"></i><span style="flex:1;min-width:170px;font-size:12px;color:var(--color-text-info);">Спросите ИИ-агента: «почему ДРР вырос?», «сравни с прошлым Disney», «прогноз итогового сбора»…</span><button class="aiask btn pri" style="padding:5px 12px;">Спросить</button></div>';}
  function histPanel(){return ['Костя · добавил релиз из all_partners · 02.03','Колодкин · эстимейт 800 млн утверждён · 12.03','Низами · субтитры → переведено · 05.04','Нурила · роспись 104/107 КТ · 25.04','Аналитика · факт 614 млн обновлён ⚙ · сегодня'].map(function(l){return '<div style="font-size:12px;padding:6px 0;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;gap:8px;"><i class="ti ti-point" style="color:var(--color-text-tertiary);" aria-hidden="true"></i>'+l+'</div>';}).join('');}

  var bopct=Math.round(F.factNum/F.estNum*100), budpct=Math.round(F.mSpent/F.mApproved*100), reachpct=Math.round(F.reachFact/F.reachGoal*100);

  var PANELS={
    box:function(){return estimateHistory()+'<div class="sec"><h4>Сборы · данные на '+F.asOf+'</h4>'+boxBlock()+'</div>';},
    boxOwner:function(){return estimateHistory()+'<div class="sec"><h4>Эстимейт vs факт — по дням с первого дня проката (KZ и СНГ)</h4>'+dailyChart()+'<div class="legend"><span style="color:var(--color-text-primary);">— факт KZ</span> · <span style="color:#378ADD;">— факт СНГ</span> · ---- estimate KZ · день 1 = старт проката</div></div><div class="sec"><h4>Сборы · данные на '+F.asOf+'</h4>'+boxBlock()+'</div>'+ownerInsights();},
    boxRustam:function(){return estimateHistory()+'<div class="sec"><h4>Сборы · данные на '+F.asOf+'</h4>'+boxBlock()+'</div><div class="sec"><h4>Сопоставимые (Comp Engine)</h4>'+compTable()+'<div class="legend">Сезонность «Когда выходить»: нед. 18 — средняя сила сезона.</div></div>';},
    ovKol:function(){return '<div class="sec">'+grid(2,bc('Логлайн','<span style="font-size:13px;font-weight:400;">'+F.logline+'</span>')+bc('Эстимейт (утв.)','₸ '+F.estNum+' млн'))+'</div><div class="sec"><h4>Команда</h4><table class="t"><tr><td style="color:var(--color-text-secondary);">Режиссёр</td><td style="text-align:right;">'+F.director+' · '+F.knownFor+'</td></tr><tr><td style="color:var(--color-text-secondary);">Каст</td><td style="text-align:right;">'+F.cast+'</td></tr></table></div><div class="sec"><h4>Сопоставимые (Comp Engine)</h4>'+compTable()+'</div><div class="sec"><h4>Ситуация недели</h4><div style="font-size:12px;color:var(--color-text-secondary);">Нед. 18: нет сильных конкурентов · '+pill('risk: low','success')+'</div></div>';},
    ovIgor:function(){return '<div class="sec">'+aiBar()+'</div><div class="sec">'+grid(3,mcs('Бокс-офис KZ','₸ 614М','77% от est','warning')+mcs('Бокс-офис СНГ','₸ 864М','5 территорий')+mcs('Зрители СНГ','254K','в т.ч. KZ 171K')+mcs('Доля рынка KZ','27%','неделя релиза')+mcs('ДРР','5.1%','норма < 8%','success')+mcs('Маркет-бюджет','₸ 31/40М','78% освоено','success'))+'</div><div class="sec"><h4>Динамика по дням — KZ / СНГ vs estimate</h4>'+dailyChart()+'<div class="legend"><span style="color:var(--color-text-primary);">— KZ</span> · <span style="color:#378ADD;">— СНГ</span> · ---- estimate</div></div><div class="sec">'+grid(2,'<div><h4>По территориям</h4>'+terrMini()+'</div>'+'<div><h4>Мир — Box Office Mojo</h4>'+worldMini()+'</div>')+'</div><div class="sec"><h4>vs сопоставимые (наш / средний AA)</h4><table class="t"><tr><td></td><td class="hd">Наш</td><td class="hd">Средний AA</td></tr>'+[['Сборы % от est','77%','95%'],['Открытие % итога','29%','35%'],['Маркет-бюджет %','5%','8%']].map(function(r){return '<tr><td style="color:var(--color-text-secondary);">'+r[0]+'</td><td style="text-align:right;font-weight:500;">'+r[1]+'</td><td style="text-align:right;color:var(--color-text-secondary);">'+r[2]+'</td></tr>';}).join('')+'</table></div><div class="sec"><div style="font-size:12px;color:var(--color-text-secondary);">Статус: '+pill('В прокате','success')+' · недобор к estimate ≈ 23% · полный разбор — во вкладке «Эстимейт & Сборы»</div></div>';},
    ovDin:function(){return '<div class="sec">'+grid(2,mc('Маркет-бюджет','₸ '+F.mSpent+' млн','Потрачено / утв. ₸ '+F.mApproved+' млн',budpct,'остаток ₸ '+(F.mApproved-F.mSpent)+' млн','success')+mc('Охват кампании',F.reachFact+'M','Факт / цель '+F.reachGoal+'M просм.',reachpct,reachpct+'% от цели','warning')+mc('ДРР',F.drr+'%','',null,'в норме','success')+mc('Бюджет от estimate','₸ 40–80 млн','7–10% от ₸ '+F.estNum+' млн',null,'',null))+'</div><div class="sec"><h4>Даты кампании</h4><table class="t"><tr><td style="color:var(--color-text-secondary);">Трейлер</td><td style="text-align:right;">'+F.trailerDate+'</td></tr><tr><td style="color:var(--color-text-secondary);">Старт предпродажи</td><td style="text-align:right;">'+F.presaleDate+'</td></tr><tr><td style="color:var(--color-text-secondary);">Премьера</td><td style="text-align:right;">'+F.premiereDate+'</td></tr></table></div><div class="sec"><h4>Соцсети — блогеры и контент</h4><table class="t"><tr><td>Аккаунт</td><td class="hd">Площадка</td><td class="hd">Формат</td><td class="hd">Тип</td><td class="hd">Охват</td></tr>'+F.social.map(function(s){return '<tr><td>'+s.acc+'</td><td style="text-align:right;">'+platIcon(s.plat)+s.plat+'</td><td style="text-align:right;">'+s.fmt+'</td><td style="text-align:right;color:var(--color-text-secondary);">'+s.type+'</td><td style="text-align:right;font-weight:500;">'+s.reach+'</td></tr>';}).join('')+'</table></div>';},
    ops:function(){return '<div class="sec">'+grid(2,mc('Прогресс росписи',F.copies+'/'+F.total,'кинотеатров согласовано',F.copies/F.total*100,Math.round(F.copies/F.total*100)+'%','info')+mc('ПУ',F.pu,'гейт выгрузки',null,'выгрузка разблокирована','success'))+'</div><div class="sec"><h4>Параметры росписи</h4><table class="t"><tr><td style="color:var(--color-text-secondary);">Окно проката</td><td style="text-align:right;">'+F.window+'</td></tr><tr><td style="color:var(--color-text-secondary);">Форматы</td><td style="text-align:right;">'+F.fmt+'</td></tr><tr><td style="color:var(--color-text-secondary);">Территории</td><td style="text-align:right;">'+F.terr+'</td></tr><tr><td style="color:var(--color-text-secondary);">Минималка / %</td><td style="text-align:right;">'+F.minGuarantee+' · '+F.rightShare+'</td></tr><tr><td style="color:var(--color-text-secondary);">Срок росписи</td><td style="text-align:right;">'+F.rosterDeadline+'</td></tr><tr><td style="color:var(--color-text-secondary);">Возраст</td><td style="text-align:right;">'+F.age+'</td></tr></table></div>';},
    loc:function(){return '<div class="sec"><h4>Локализация</h4><table class="t"><tr><td style="color:var(--color-text-secondary);">Дубляж</td><td style="text-align:right;">'+F.dub+'</td></tr><tr><td style="color:var(--color-text-secondary);">Субтитры</td><td style="text-align:right;">'+F.subLang+'</td></tr><tr><td style="color:var(--color-text-secondary);">Готовность субтитров</td><td style="text-align:right;">'+pill('переведено','success')+'</td></tr><tr><td style="color:var(--color-text-secondary);">Подрядчик</td><td style="text-align:right;">'+F.contractor+'</td></tr><tr><td style="color:var(--color-text-secondary);">Диалоговые листы</td><td style="text-align:right;">'+F.dialog+'</td></tr><tr><td style="color:var(--color-text-secondary);">Файлы</td><td style="text-align:right;">'+pill(F.files,'success')+'</td></tr><tr><td style="color:var(--color-text-secondary);">Хронометраж</td><td style="text-align:right;">'+F.runtime+' мин</td></tr></table></div><div class="sec"><div style="font-size:12px;color:var(--color-text-success);background:var(--color-background-success);padding:7px 10px;border-radius:var(--rad);"><i class="ti ti-circle-check" aria-hidden="true"></i> Локализация готова к релизу — материалы сданы в срок.</div></div>';},
    offline:function(){var sum=F.offline.reduce(function(a,o){return a+(parseFloat(o[3].replace(/[^0-9.]/g,''))||0);},0);var rows=F.offline.map(function(o){var st=/размещ|оплач/.test(o[4])?'success':(/работе/.test(o[4])?'warning':'info');return '<tr><td>'+o[0]+'</td><td style="text-align:right;color:var(--color-text-secondary);">'+o[1]+'</td><td style="text-align:right;color:var(--color-text-secondary);">'+o[2]+'</td><td style="text-align:right;font-weight:500;">'+o[3]+'</td><td style="text-align:right;">'+pill(o[4],st)+'</td></tr>';}).join('');return '<div class="sec"><h4>Заказы офлайн-рекламы</h4><table class="t"><tr><td>Подрядчик / площадка</td><td class="hd">Тип</td><td class="hd">Детали</td><td class="hd">Цена</td><td class="hd">Статус</td></tr>'+rows+'<tr style="font-weight:500;"><td>Итого</td><td></td><td></td><td style="text-align:right;">₸ '+sum.toFixed(1)+' млн</td><td></td></tr></table></div><div class="sec" style="display:flex;gap:8px;"><button class="btn pri"><i class="ti ti-download" aria-hidden="true"></i> Выгрузить для бухгалтерии</button><button class="btn"><i class="ti ti-plus" aria-hidden="true"></i> Добавить заказ</button></div>';},
    press:function(){return '<div class="sec"><h4>Пресс-синопсис</h4><div style="font-size:13px;">'+F.logline+' Возвращение культовой франшизы о мире моды.</div></div><div class="sec"><h4>Медиа-ассеты (MAM)</h4><div style="display:flex;gap:7px;flex-wrap:wrap;"><span class="tag"><i class="ti ti-photo" aria-hidden="true"></i> постер</span><span class="tag"><i class="ti ti-camera" aria-hidden="true"></i> 12 кадров</span><span class="tag"><i class="ti ti-movie" aria-hidden="true"></i> трейлер</span><span class="tag"><i class="ti ti-file-text" aria-hidden="true"></i> пресс-кит</span></div></div><div class="sec"><h4>События</h4><table class="t"><tr><td style="color:var(--color-text-secondary);">Пресс-показ</td><td style="text-align:right;">28 апр</td></tr><tr><td style="color:var(--color-text-secondary);">Премьера</td><td style="text-align:right;">'+F.premiereDate+'</td></tr><tr><td style="color:var(--color-text-secondary);">Рейтинг</td><td style="text-align:right;">'+F.age+'</td></tr></table></div><div class="sec"><h4>Рассылки</h4><div style="font-size:12px;display:flex;gap:8px;flex-wrap:wrap;">'+pill('СМИ — 24','success')+pill('Блогеры — 48','success')+pill('Кинотеатры — в очереди','warning')+'</div></div>';},
    inp:function(){return '<div class="sec"><h4>Провенанс</h4><table class="t"><tr><td style="color:var(--color-text-secondary);">Источник</td><td style="text-align:right;"><i class="ti ti-table" aria-hidden="true"></i> '+F.source+'</td></tr><tr><td style="color:var(--color-text-secondary);">Версия (As Of)</td><td style="text-align:right;">'+F.asOf+'</td></tr><tr><td style="color:var(--color-text-secondary);">Подтверждена</td><td style="text-align:right;">'+pill('да','success')+'</td></tr><tr><td style="color:var(--color-text-secondary);">Дубль-проверка</td><td style="text-align:right;">'+pill('уникально','success')+'</td></tr></table></div><div class="sec"><h4>Базовые поля</h4><table class="t"><tr><td style="color:var(--color-text-secondary);">Дата релиза</td><td style="text-align:right;">'+F.date+'</td></tr><tr><td style="color:var(--color-text-secondary);">Территории</td><td style="text-align:right;">'+F.terr+'</td></tr><tr><td style="color:var(--color-text-secondary);">Форматы</td><td style="text-align:right;">'+F.fmt+'</td></tr><tr><td style="color:var(--color-text-secondary);">Категория</td><td style="text-align:right;">'+F.cat+'</td></tr></table></div>';},
    hist:histPanel
  };

  var ROLES=[
    {name:'Колодкин — дистрибуция',icon:'ti-bulb',need:'данные для решения «брать / на какую дату»',edit:true,openIn:'Открыть в Планировании релизов',tabs:[['ovKol','Обзор'],['box','Эстимейт & Сборы'],['hist','История']]},
    {name:'Игорь — владелец',icon:'ti-eye',need:'панорама: по дням, территориям, vs мир и сопоставимые + ИИ-агент · только чтение',edit:false,openIn:'Открыть полную карточку (Планирование)',tabs:[['ovIgor','Обзор'],['boxOwner','Эстимейт & Сборы'],['hist','История']]},
    {name:'Динара — маркетинг',icon:'ti-speakerphone',need:'кампания + соцсети по площадкам/блогерам/форматам',edit:true,openIn:'Открыть в Маркетинге',tabs:[['ovDin','Обзор'],['box','Эстимейт & Сборы'],['hist','История']]},
    {name:'Алима — PR',icon:'ti-news',need:'материалы и рассылки, публичные факты',edit:false,openIn:'Открыть в Маркетинге и PR',tabs:[['press','Обзор'],['hist','История']]},
    {name:'Нурила — букинг',icon:'ti-list-check',need:'расписать по КТ и согласовать',edit:true,openIn:'Перейти к росписи',tabs:[['ops','Операционка'],['hist','История']]},
    {name:'Низами — локализация и офлайн',icon:'ti-language',need:'контент к сроку + учёт офлайн-рекламы',edit:true,openIn:'Открыть в Маркетинге и PR',tabs:[['loc','Локализация'],['offline','Офлайн-реклама'],['hist','История']]},
    {name:'Рустам — аналитик',icon:'ti-world',need:'живые сборы и рыночный контекст',edit:false,openIn:'Открыть в Аналитике',tabs:[['boxRustam','Эстимейт & Сборы'],['hist','История']]},
    {name:'Костя — оператор',icon:'ti-pencil',need:'завести/сверить данные и провенанс',edit:true,openIn:'Открыть в Графике релизов',tabs:[['inp','Ввод'],['hist','История']]}
  ];

  var g=document.getElementById('gallery'),html='';
  ROLES.forEach(function(r,i){
    html+='<div class="rolehdr"><div class="ic"><i class="ti '+r.icon+'" aria-hidden="true"></i></div><div><h2>'+r.name+'</h2><div class="need">Что нужно: '+r.need+'</div></div></div>';
    html+='<div class="fcard">'+head(r.edit,r.openIn)+'<div class="ctabbar">'+r.tabs.map(function(t,j){return '<button class="ctab'+(j===0?' on':'')+'" data-card="'+i+'" data-tab="'+t[0]+'">'+t[1]+'</button>';}).join('')+'</div><div class="cpanel" id="panel-'+i+'">'+PANELS[r.tabs[0][0]]()+'</div></div>';
  });
  g.innerHTML=html;

  function toast(m){var t=document.createElement('div');t.textContent=m;t.style.cssText='position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--color-text-primary);color:var(--color-background-primary);padding:9px 15px;border-radius:8px;font-size:13px;z-index:99;max-width:90%;text-align:center;';document.body.appendChild(t);setTimeout(function(){t.remove();},2600);}
  function wireAI(){Array.prototype.forEach.call(document.querySelectorAll('.aiask'),function(b){b.onclick=function(e){e.stopPropagation();toast('ИИ-агент: отвечу на любой бизнес-вопрос по проекту за секунды (демо)');};});}
  Array.prototype.forEach.call(document.querySelectorAll('.navbtn'),function(b){b.onclick=function(){toast('→ '+b.getAttribute('data-nav'));};});
  Array.prototype.forEach.call(document.querySelectorAll('.ctab'),function(b){b.onclick=function(){var i=this.getAttribute('data-card'),tab=this.getAttribute('data-tab');document.getElementById('panel-'+i).innerHTML=PANELS[tab]();Array.prototype.forEach.call(document.querySelectorAll('.ctab[data-card="'+i+'"]'),function(x){x.classList.toggle('on',x===b);});wireAI();};});
  wireAI();
})();
</script>
</body>
